<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD 대시보드</title>
    <style>
        :root {
            --bg: #080808; --surface: #111; --surface2: #161616;
            --green: #3FBE6F; --green-dim: rgba(63,190,111,0.08);
            --gold: #D4A83C; --gold-dim: rgba(212,168,60,0.08);
            --blue: #3D84F0; --blue-dim: rgba(61,132,240,0.1);
            --text: #e4e4e4; --text2: #aaa; --text3: #666;
            --border: rgba(255,255,255,0.05); --border2: rgba(255,255,255,0.08);
            --radius: 10px; --font: 'Inter',-apple-system,'Segoe UI',sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; line-height:1.5; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .header { display:flex; align-items:center; gap:24px; padding:14px 28px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
        .logo { font-size:1.2rem; font-weight:800; color:var(--green); letter-spacing:0.5px; text-decoration:none; }
        .logo:hover { opacity:0.8; }
        .back { font-size:0.78rem; color:var(--text3); text-decoration:none; transition:color 0.2s; margin-right:auto; }
        .back:hover { color:var(--green); }
        .header-meta { display:flex; gap:28px; align-items:center; }
        .meta-item { text-align:right; }
        .meta-val { font-weight:700; font-size:1rem; }
        .meta-label { font-size:0.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; }
        .toolbar { display:flex; align-items:center; gap:10px; padding:10px 28px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .toolbar select, .toolbar input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:6px; font-size:0.8rem; font-family:inherit; outline:none; transition:border-color 0.2s; }
        .toolbar select:focus, .toolbar input:focus { border-color:var(--green); }
        .toolbar input { width:200px; }
        .toolbar .count { margin-left:auto; font-size:0.78rem; color:var(--text3); }
        .main { display:flex; flex:1; overflow:hidden; }
        .table-wrap { flex:0 0 54%; display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
        .table-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
        .table-scroll::-webkit-scrollbar { width:4px; }
        .table-scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
        table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:680px; }
        thead { position:sticky; top:0; z-index:2; background:var(--surface); }
        th { text-align:left; padding:12px 14px; font-size:0.7rem; font-weight:600; color:var(--text3); letter-spacing:0.5px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; transition:color 0.15s; }
        th:hover { color:var(--text2); }
        th.sorted { color:var(--green) !important; }
        th .arrow { font-size:0.55rem; margin-left:4px; display:inline-block; transition:transform 0.2s; }
        th.desc .arrow { transform:rotate(180deg); }
        td { padding:11px 14px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.82rem; }
        tr { cursor:pointer; transition:background 0.12s; }
        tr:hover { background:rgba(255,255,255,0.02); }
        tr.selected { background:var(--green-dim); }
        tr.selected .name { color:var(--green); }
        .name { font-weight:600; color:var(--gold); }
        .name.green { color:var(--green); }
        .score-cell { display:flex; align-items:center; gap:8px; }
        .score-num { font-weight:700; font-size:0.85rem; min-width:36px; text-align:right; }
        .score-num.g { color:var(--green); }
        .score-num.y { color:var(--gold); }
        .score-num.d { color:var(--text2); }
        .bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; min-width:24px; }
        .bar-fill { height:100%; border-radius:2px; transition:width 0.3s; }
        .bar-fill.g { background:var(--green); }
        .bar-fill.y { background:var(--gold); }
        .bar-fill.b { background:var(--blue); }
        .bar-fill.d { background:var(--text3); }
        .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:600; letter-spacing:0.5px; }
        .status.v { background:var(--green-dim); color:var(--green); }
        .status.r { background:var(--gold-dim); color:var(--gold); }
        .status.l { background:rgba(255,255,255,0.04); color:var(--text3); }
        .open { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:var(--blue-dim); color:var(--blue); text-decoration:none; font-size:0.75rem; font-weight:700; transition:all 0.15s; }
        .open:hover { background:var(--blue); color:#fff; }
        .cat { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.65rem; font-weight:600; letter-spacing:0.3px; white-space:nowrap; line-height:1.4; vertical-align:middle; text-align:center; }
        .cat.dev { background:rgba(61,132,240,0.12); color:var(--blue); }
        .cat.ai { background:rgba(155,89,182,0.12); color:#9B59B6; }
        .cat.data { background:rgba(52,152,219,0.12); color:#3498DB; }
        .cat.prod { background:rgba(46,204,113,0.12); color:#2ECC71; }
        .cat.mkt { background:rgba(230,126,34,0.12); color:#E67E22; }
        .cat.fin { background:rgba(231,76,60,0.12); color:#E74C3C; }
        .cat.comm { background:rgba(26,188,156,0.12); color:#1ABC9C; }
        .cat.des { background:rgba(241,196,15,0.12); color:#F1C40F; }
        .cat.sec { background:rgba(149,165,166,0.2); color:#bdc3c7; }
        .cat.etc { background:rgba(255,255,255,0.05); color:var(--text3); }
        .detail { flex:1; background:var(--surface); overflow-y:auto; padding:32px; }
        .detail::-webkit-scrollbar { width:4px; }
        .detail::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
        .detail-empty { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text3); font-size:0.95rem; }
        .detail-content { animation:fade 0.25s ease; }
        @keyframes fade { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        .detail-title { font-size:1.4rem; font-weight:700; margin-bottom:4px; line-height:1.3; }
        .detail-link { display:inline-flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--blue); text-decoration:none; margin-bottom:20px; padding:4px 10px; background:var(--blue-dim); border-radius:5px; transition:all 0.15s; }
        .detail-link:hover { background:var(--blue); color:#fff; }
        .detail-link .arrow-icon { font-size:0.7rem; }
        .detail-score { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
        .detail-big { font-size:3.5rem; font-weight:800; color:var(--green); letter-spacing:-0.02em; }
        .detail-big sub { font-size:1.2rem; color:var(--text3); font-weight:400; }
        .detail-score-bar { flex:1; height:4px; background:var(--border2); border-radius:2px; overflow:hidden; }
        .detail-score-fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.5s ease; }
        .metrics { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
        .metric-row { display:flex; align-items:center; gap:12px; }
        .metric-label { width:72px; font-size:0.78rem; color:var(--text3); flex-shrink:0; }
        .metric-track { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
        .metric-fill { height:100%; border-radius:3px; transition:width 0.4s; }
        .metric-fill.c { background:var(--blue); }
        .metric-fill.u { background:var(--gold); }
        .metric-fill.b { background:#9B59B6; }
        .metric-val { width:40px; text-align:right; font-weight:700; font-size:0.85rem; }
        .sec { padding:18px 0; border-top:1px solid var(--border); }
        .sec h4 { font-size:0.7rem; font-weight:600; color:var(--text3); letter-spacing:1px; margin-bottom:10px; }
        .sec p { font-size:0.9rem; color:var(--text); line-height:1.75; }
        .sec ul { list-style:none; padding:0; }
        .sec ul li { padding:6px 0; font-size:0.85rem; color:var(--text); border-bottom:1px solid var(--border); line-height:1.6; }
        .sec ul li:last-child { border-bottom:none; }
        .close-btn { margin-top:20px; padding:8px 20px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); border-radius:6px; font-size:0.82rem; cursor:pointer; transition:all 0.15s; }
        .close-btn:hover { border-color:var(--text3); color:var(--text); }
        @media (max-width:900px) { .main { flex-direction:column; } .table-wrap { flex:0 0 50%; border-right:none; border-bottom:1px solid var(--border); } .detail { flex:1; } }
    </style>
</head>
<body>

<header class="header">
    <span class="logo">KLD</span>
    <a href="index.html" class="back">← 랜딩으로</a>
    <div class="header-meta">
        <div class="meta-item"><div class="meta-val" id="stat-total">144</div><div class="meta-label">수집</div></div>
        <div class="meta-item"><div class="meta-val" id="stat-analyzed">143</div><div class="meta-label">분석</div></div>
        <div class="meta-item"><div class="meta-val" id="stat-queue">1</div><div class="meta-label">대기</div></div>
    </div>
</header>

<div class="toolbar">
    <select id="source-filter"><option value="">전체 소스</option></select>
    <select id="score-filter"><option value="0">점수 전체</option><option value="50">점수 50+</option><option value="70">점수 70+</option></select>
    <select id="conf-filter"><option value="0">신뢰도 전체</option><option value="0.5">신뢰도 50%+</option><option value="0.7">신뢰도 70%+</option></select>
    <select id="category-filter"><option value="">전체 카테고리</option></select>
    <input type="text" id="search-input" placeholder="서비스 검색...">
    <span class="count" id="result-count">144개 결과</span>
</div>

<div class="main">
    <div class="table-wrap">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th class="sorted desc" data-sort="score">점수 <span class="arrow">▾</span></th>
                        <th data-sort="name">서비스명 <span class="arrow">▾</span></th>
                        <th>카테고리</th>
                        <th data-sort="confidence">신뢰도 <span class="arrow">▾</span></th>
                        <th data-sort="upside">성장성 <span class="arrow">▾</span></th>
                        <th>상태</th>
                        <th style="width:44px"></th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    <div class="detail" id="detail-panel">
        <div class="detail-empty">왼쪽에서 분석할 서비스를 선택하세요</div>
    </div>
</div>

<script>
const API = 'https://api.kld.etfsimulator.blog';
let allServices = [], selectedId = null, currentSort = 'score', sortDesc = true;

async function fetchStats() {
    try {
        const d = await (await fetch(`${API}/api/stats`)).json();
        document.getElementById('stat-total').textContent = d.total_services||0;
        document.getElementById('stat-analyzed').textContent = d.total_analyzed||0;
        document.getElementById('stat-queue').textContent = Math.max(0,(d.total_services||0)-(d.total_analyzed||0));
    } catch(e){}
}

async function fetchSources() {
    try {
        const d = await (await fetch(`${API}/api/sources`)).json();
        const sel = document.getElementById('source-filter');
        d.sources.forEach(s => { const o = document.createElement('option'); o.value=s.source; o.textContent=s.source; sel.appendChild(o); });
    } catch(e){}
}

async function fetchServices() {
    const src = document.getElementById('source-filter').value;
    const minS = document.getElementById('score-filter').value;
    const minC = document.getElementById('conf-filter').value;
    const cat = document.getElementById('category-filter').value;
    const q = (document.getElementById('search-input').value||'').toLowerCase();
    let url = `${API}/api/services?limit=200`;
    if (src) url += `&source=${encodeURIComponent(src)}`;
    if (minS>0) url += `&min_score=${minS}`;
    try {
        const d = await (await fetch(url)).json();
        let items = d.services||[];
        if (q) items = items.filter(s => (s.name||'').toLowerCase().includes(q));
        if (minC>0) items = items.filter(s => (s.confidence||0) >= parseFloat(minC));
        if (cat) items = items.filter(s => (s.category||'기타') === cat);
        allServices = items;
        document.getElementById('result-count').textContent = `${items.length}개 결과`;
        if (!document.getElementById('category-filter').dataset.loaded) {
            populateCategories();
            document.getElementById('category-filter').dataset.loaded = '1';
        }
        render();
    } catch(e){ document.getElementById('result-count').textContent = '오류'; }
}

const G = s => s.score||s.localization_score||0;

function render() {
    const sorted = [...allServices].sort((a,b) => {
        let va,vb;
        if (currentSort==='name') { va=(a.name||'').toLowerCase(); vb=(b.name||'').toLowerCase(); return sortDesc ? vb.localeCompare(va) : va.localeCompare(vb); }
        if (currentSort==='confidence') { va=a.confidence||0; vb=b.confidence||0; }
        else if (currentSort==='upside') { va=a.upside||0; vb=b.upside||0; }
        else { va=G(a); vb=G(b); }
        return sortDesc ? vb-va : va-vb;
    });
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = sorted.map(s => {
        const sc = G(s), cf = s.confidence||0.5, up = s.upside||0.5;
        const sel = selectedId===s.id;
        const sn = sc>=70?'g':sc>=40?'y':'d';
        let stc,stt;
        if (sc>=70) { stc='v'; stt='유망'; } else if (sc>=40) { stc='r'; stt='검토'; } else if (sc>0) { stc='l'; stt='낮음'; } else { stc=''; stt=''; }
        return `<tr data-id="${s.id}" onclick="select(${s.id})" class="${sel?'selected':''}">
            <td><div class="score-cell"><span class="score-num ${sn}">${sc}</span><div class="bar"><div class="bar-fill ${sn}" style="width:${sc}%"></div></div></div></td>
            <td class="name ${sel||sc>=65?'green':''}">${esc(s.name)}</td>
            <td>${catBadge(s.category)}</td>
            <td><div class="score-cell"><span class="score-num" style="color:var(--text3)">${Math.round(cf*100)}%</span><div class="bar"><div class="bar-fill b" style="width:${Math.round(cf*100)}%"></div></div></div></td>
            <td><div class="score-cell"><span class="score-num" style="color:var(--text3)">${Math.round(up*100)}%</span><div class="bar"><div class="bar-fill y" style="width:${Math.round(up*100)}%"></div></div></div></td>
            <td>${stt?`<span class="status ${stc}">${stt}</span>`:''}</td>
            <td>${s.url?`<a class="open" href="${esc(s.url)}" target="_blank" onclick="event.stopPropagation()" title="서비스 열기">↗</a>`:''}</td>
        </tr>`;
    }).join('');
}

async function select(id) {
    selectedId=id; render();
    const p = document.getElementById('detail-panel');
    p.innerHTML = '<div class="detail-empty">불러오는 중...</div>';
    try {
        const d = await (await fetch(`${API}/api/report/${id}`)).json();
        const svc = d.service||{}, r = d.report||{};
        const sc = r.localization_score||0, cf=r.confidence||0.5, up=r.upside||0.5, bo=r.boldness||0.5;
        const secs = [];
        secs.push(`<div class="detail-title">${esc(svc.name)}</div>`);
        if (svc.url) secs.push(`<a class="detail-link" href="${esc(svc.url)}" target="_blank"><span class="arrow-icon">↗</span> 서비스 바로가기</a>`);
        secs.push(`<div class="detail-score"><span class="detail-big">${sc}<sub>/100</sub></span><div class="detail-score-bar"><div class="detail-score-fill" style="width:${sc}%"></div></div></div>`);
        secs.push(`<div class="metrics">
            <div class="metric-row"><span class="metric-label">신뢰도</span><div class="metric-track"><div class="metric-fill c" style="width:${Math.round(cf*100)}%"></div></div><span class="metric-val">${Math.round(cf*100)}%</span></div>
            <div class="metric-row"><span class="metric-label">성장성</span><div class="metric-track"><div class="metric-fill u" style="width:${Math.round(up*100)}%"></div></div><span class="metric-val">${Math.round(up*100)}%</span></div>
            <div class="metric-row"><span class="metric-label">대담성</span><div class="metric-track"><div class="metric-fill b" style="width:${Math.round(bo*100)}%"></div></div><span class="metric-val">${Math.round(bo*100)}%</span></div>
        </div>`);
        const add = (t,c) => { if(c) secs.push(`<div class="sec"><h4>${t}</h4><p>${esc(c)}</p></div>`); };
        add('요약', r.summary_ko||r.summary);
        add('현지화 근거', r.localization_reason);
        add('경쟁 분석', r.competitor_analysis);
        add('수익화 전략', r.monetization_ko);
        add('예상 개발 기간', r.estimated_dev_time);
        add('리스크 요인', r.regulatory_risks||r.risk_factors);
        if (r.required_korean_apis) {
            let apis = r.required_korean_apis;
            if (typeof apis==='string') try{apis=JSON.parse(apis);}catch(e){apis=[apis];}
            if (Array.isArray(apis)&&apis.length) {
                secs.push(`<div class="sec"><h4>필요 국내 API</h4><ul>${apis.map(a => `<li><strong>${esc(typeof a==='string'?a:a.name||'')}</strong>${typeof a==='object'&&a.reason?` — ${esc(a.reason)}`:''}</li>`).join('')}</ul></div>`);
            }
        }
        secs.push(`<button class="close-btn" onclick="closeDetail()">닫기</button>`);
        p.innerHTML = `<div class="detail-content">${secs.join('')}</div>`;
    } catch(e) {
        p.innerHTML = '<div class="detail-empty">불러오기 실패</div>';
    }
}

function closeDetail() {
    selectedId=null; render();
    document.getElementById('detail-panel').innerHTML = '<div class="detail-empty">왼쪽에서 분석할 서비스를 선택하세요</div>';
}

function esc(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function catBadge(c) {
    const map = {'AI/ML':'ai','개발도구':'dev','데이터/분석':'data','생산성':'prod','마케팅':'mkt','금융/결제':'fin','커뮤니케이션':'comm','디자인':'des','보안':'sec'};
    const cls = map[c||''] || 'etc';
    return `<span class="cat ${cls}">${esc(c||'기타')}</span>`;
}

function populateCategories() {
    const cats = [...new Set(allServices.map(s => s.category||'기타'))].sort();
    const sel = document.getElementById('category-filter');
    cats.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
}

document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
        const k = th.dataset.sort;
        if (currentSort===k) sortDesc=!sortDesc; else { currentSort=k; sortDesc=true; }
        document.querySelectorAll('th').forEach(h => h.classList.remove('sorted','desc'));
        th.classList.add('sorted');
        if (sortDesc) th.classList.add('desc');
        render();
    });
});
document.getElementById('source-filter').addEventListener('change', fetchServices);
document.getElementById('score-filter').addEventListener('change', fetchServices);
document.getElementById('conf-filter').addEventListener('change', fetchServices);
document.getElementById('search-input').addEventListener('input', fetchServices);
document.getElementById('category-filter').addEventListener('change', fetchServices);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

fetchStats(); fetchSources(); fetchServices();
</script>
</body>
</html>
