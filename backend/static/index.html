<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD — Korean Localization Detector</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="global-header">
    <div class="header-left">
        <h1 class="logo">KLD</h1>
        <span class="tagline">Korean Localization Detector</span>
    </div>
    <div class="header-center">
        <input type="text" class="search-bar" placeholder="Search..." id="search-input">
    </div>
    <div class="header-right">
        <div class="header-indicator">
            <span class="indicator-num" id="stat-total">0</span>
            <span class="indicator-label">Collected</span>
        </div>
        <div class="header-indicator">
            <span class="indicator-num" id="stat-analyzed">0</span>
            <span class="indicator-label">Analyzed</span>
        </div>
        <div class="header-indicator">
            <span class="indicator-num accent" id="stat-high">0</span>
            <span class="indicator-label">Viable</span>
        </div>
    </div>
</header>

<nav class="sub-nav">
    <select id="source-filter">
        <option value="">All Sources</option>
    </select>
    <select id="score-filter">
        <option value="0">All Scores</option>
        <option value="70">70+ (Viable)</option>
        <option value="50">50+ (Review)</option>
    </select>
    <span class="result-count" id="result-count">0 results</span>
</nav>

<div class="content-layout">

    <!-- Left: Numbered List -->
    <section class="list-panel">
        <div class="list-container" id="service-list">
            <!-- JS rendering -->
        </div>
    </section>

    <!-- Right: Analyst Report Brief -->
    <aside class="brief-panel" id="brief-panel">
        <div class="brief-empty">
            <h3>OPPORTUNITY BRIEF</h3>
            <p>Select an item to view the full localization analysis.</p>
        </div>
    </aside>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
