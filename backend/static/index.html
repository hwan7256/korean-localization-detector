<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD — Korean Localization Detector</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Left Icon Sidebar -->
<nav class="nav-sidebar">
    <div class="nav-brand">K</div>
    <ul class="nav-icons">
        <li class="nav-icon active" title="Dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </li>
        <li class="nav-icon" title="Reports">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </li>
        <li class="nav-icon" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </li>
    </ul>
</nav>

<!-- Triage Table (Compact Master List) -->
<section class="master-panel">
    <div class="master-header">
        <input type="text" class="master-search" placeholder="Search..." id="search-input">
        <div class="master-filters">
            <select id="source-filter"><option value="">All Sources</option></select>
            <select id="score-filter"><option value="0">All Scores</option><option value="70">70+</option><option value="50">50+</option></select>
        </div>
    </div>
    <div class="master-table-wrap">
        <table class="triage-table" id="triage-table">
            <thead>
                <tr>
                    <th class="sortable active-sort" data-sort="score">Score <span class="sort-arrows"><span class="arr-up">▲</span><span class="arr-dn">▼</span></span></th>
                    <th class="sortable" data-sort="name">Name <span class="sort-arrows"><span class="arr-up">▲</span><span class="arr-dn">▼</span></span></th>
                    <th class="sortable" data-sort="confidence">Conf <span class="sort-arrows"><span class="arr-up">▲</span><span class="arr-dn">▼</span></span></th>
                    <th class="sortable" data-sort="upside">Upside <span class="sort-arrows"><span class="arr-up">▲</span><span class="arr-dn">▼</span></span></th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <div class="master-footer">
        <span class="result-count" id="result-count">0 results</span>
    </div>
</section>

<!-- Detail Panel (Primary Analysis View) -->
<main class="detail-panel" id="detail-panel">
    <div class="detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#909195" stroke-width="1" opacity="0.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>Select an item to view analysis</p>
    </div>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
