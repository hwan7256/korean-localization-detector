<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLD — Korean Localization Detector</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Left Sidebar -->
<nav class="sidebar">
    <div class="sidebar-brand">KLD</div>
    <ul class="sidebar-nav">
        <li class="sidebar-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
        </li>
        <li class="sidebar-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Reports</span>
        </li>
        <li class="sidebar-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Settings</span>
        </li>
    </ul>
</nav>

<!-- Main Content -->
<main class="main-content">

    <!-- Header -->
    <header class="global-header">
        <div class="header-brand">
            <span class="header-title">KLD — Korean Localization Detector</span>
        </div>
        <div class="header-actions">
            <div class="header-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="badge-num" id="stat-total">0</span>
            </div>
            <div class="header-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="badge-num" id="stat-high">0</span>
            </div>
        </div>
    </header>

    <!-- Sub Header: Search + Filters -->
    <div class="sub-header">
        <input type="text" class="search-bar" placeholder="Search..." id="search-input">
        <select id="source-filter">
            <option value="">All Sources</option>
        </select>
        <select id="score-filter">
            <option value="0">All Scores</option>
            <option value="70">70+ Viable</option>
            <option value="50">50+ Review</option>
        </select>
        <span class="result-count" id="result-count">0 results</span>
    </div>

    <!-- Triage Table -->
    <div class="table-wrapper">
        <table class="triage-table" id="triage-table">
            <thead>
                <tr>
                    <th class="col-check"><input type="checkbox" id="select-all"></th>
                    <th class="col-name sortable" data-sort="name">
                        Name <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-num sortable active-sort" data-sort="score">
                        Score <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-num sortable" data-sort="confidence">
                        Confidence <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-num sortable" data-sort="upside">
                        Upside <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-num sortable" data-sort="boldness">
                        Boldness <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-num sortable" data-sort="total">
                        Total <span class="sort-arrow">▲</span>
                    </th>
                    <th class="col-status">Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- JS rendering -->
            </tbody>
        </table>
    </div>

</main>

<!-- Right Detail Panel -->
<aside class="detail-panel" id="detail-panel">
    <div class="detail-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>Select an item to view analysis</p>
    </div>
</aside>

<script src="/static/js/app.js"></script>
</body>
</html>
